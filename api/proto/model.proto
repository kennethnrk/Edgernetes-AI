syntax = "proto3";

package modelRegistryAPI;

option go_package = "internal/common/pb/model;modelpb";

service ModelRegistryAPI {
    rpc RegisterModel(ModelInfo) returns (BoolResponse);
    rpc DeRegisterModel(ModelID) returns (BoolResponse);
    rpc UpdateModel(UpdateModelRequest) returns (BoolResponse);
    rpc GetModel(ModelID) returns (ModelInfo);
    rpc ListModels(None) returns (ListModelsResponse);
    rpc GetModelStatus(ModelName) returns (ModelStatusResponse);
    rpc GetNodesByModelName(ModelName) returns (ModelNodesResponse);
}

message None {}

message BoolResponse {
    bool success = 1;
}

message ModelInfo {
    string id = 1;
    string name = 2;
    string version = 3;
    string file_path = 4;
    string model_type = 5;
    int64 model_size = 6;
    int32 replicas = 7;
    string input_format = 8;
}

message UpdateModelRequest {
    string id = 1;
    string name = 2;
    string version = 3;
    string file_path = 4;
    string model_type = 5;
    int64 model_size = 6;
    int32 replicas = 7;
    string input_format = 8;
}

message ModelID {
    string id = 1;
}

message ListModelsResponse {
    repeated ModelInfo models = 1;
}

message ModelName {
    string name = 1;
}

message ReplicaStatusBreakdown {
    int32 running = 1;
    int32 pending = 2;
    int32 failed = 3;
    int32 unknown = 4;
}

message ModelStatusResponse {
    string model_name = 1;
    string model_id = 2;
    string status = 3;
    int32 total_replicas = 4;
    ReplicaStatusBreakdown breakdown = 5;
}

message NodeAddress {
    string node_id = 1;
    string ip = 2;
    int32 port = 3;
}

message ModelNodesResponse {
    string model_name = 1;
    string model_id = 2;
    repeated NodeAddress nodes = 3;
}